<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Prescreen | Books OUUC</title>
    <link rel="shortcut icon" href="#">
    <link rel="icon" type="image/png" href="../favicon.ico">
    <link rel="stylesheet" href="shared.css">
</head>
<style>
.main {
    width: 90%;
    margin: auto;
    max-width: 900px;
}

input[type="text"] {
    width: 100%;
    box-sizing: border-box;
}

.search-area {
    max-width: 400px;
}

.lookup-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
}

.lookup-row input[type="text"] {
    width: auto;
    flex: 1;
}


.results-row {
    display: flex;
    gap: 24px;
    margin-top: 16px;
    font-family: sans-serif;
    align-items: flex-start;
}

.results-col {
    flex: 1;
    min-width: 0;
}

.results-col h3 {
    font-size: 24px;
    font-weight: bold;
    margin: 0 0 15px 0;
    letter-spacing: 0.05em;
    border-bottom: 1px solid black;
    padding-bottom: 14px;
}

.result-item {
    padding: 8px 0;
    border-bottom: 1px solid #bbb;
}

.result-author {
    display: block;
    font-weight: bold;
    font-size: 20px;
}

.result-title {
    display: block;
    color: #3e3e3e;
    font-size: 18px;
    margin-top: 2px;
    margin-left: 16px;
    padding-left: 16px;
    text-indent: -16px;
}

</style>
<body>
    <nav>
        <a href="index.html">Librarian</a>
    </nav>
    <div class="main">
        <h2>Prescreen</h2>
        <div class="search-area">
            <form id="isbn-form">
                <div class="lookup-row">
                    <input type="text" id="isbn-input" placeholder="ISBN" autocomplete="off">
                    <button type="submit">Prescreen</button>
                    <button type="button" class="outline" onclick="clearAll()">Clear</button>
                </div>
            </form>
            <input type="text" id="author-search" placeholder="Author..." autocomplete="off">
        </div>
        <div class="results-row">
            <div class="results-col">
                <h3>Inventory</h3>
                <div id="csv-results"></div>
            </div>
            <div class="results-col" id="watch-results">
                <h3>Title Watch</h3>
                <div id="watch-select"></div>
            </div>
        </div>
    </div>
    <script src="api.js"></script>
    <script src="prescreen.js"></script>
</body>
</html>
