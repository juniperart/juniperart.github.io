<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Prescreen | Books OUUC</title>
    <link rel="shortcut icon" href="#">
    <link rel="icon" type="image/png" href="../favicon.ico">
</head>
<style>
.main {
    width: 90%;
    margin: auto;
    max-width: 900px;
}

nav {
    text-align: right;
    padding: 10px 20px;
    font-family: sans-serif;
}

nav a {
    color: #4c92c2;
    text-decoration: none;
    font-size: 15px;
}

nav a:hover {
    text-decoration: underline;
}

input[type="text"] {
    padding: 9px 8px;
    font-size: 16px;
    border-radius: 4px;
    border: 1px solid #999;
    width: 100%;
    box-sizing: border-box;
}

.results-row {
    display: flex;
    gap: 24px;
    margin-top: 16px;
    font-family: sans-serif;
    align-items: flex-start;
}

.results-col {
    flex: 1;
    min-width: 0;
}

.results-col h3 {
    font-size: 24px;
    font-weight: bold;
    margin: 0 0 15px 0;
    letter-spacing: 0.05em;
    border-bottom: 1px solid black;
    padding-bottom: 14px;
}

.result-item {
    padding: 8px 0;
    border-bottom: 1px solid #bbb;
}

.result-author {
    display: block;
    font-weight: bold;
    font-size: 16px;
}

.result-title {
    display: block;
    color: #666;
    font-size: 16px;
    margin-top: 2px;
}

</style>
<body>
    <nav>
        <a href="index.html">Librarian</a>
    </nav>
    <div class="main">
        <h2>Prescreen</h2>
        <input type="text" id="author-search" placeholder="Author..." autocomplete="off">
        <div class="results-row">
            <div class="results-col">
                <h3>Inventory</h3>
                <div id="csv-results"></div>
            </div>
            <div class="results-col" id="watch-results">
                <h3>Title Watch</h3>
                <div id="watch-select"></div>
            </div>
        </div>
    </div>
    <script src="prescreen.js"></script>
</body>
</html>
