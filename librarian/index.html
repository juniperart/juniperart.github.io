<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
	<title>Librarian | Books OUUC</title>
    <link rel="shortcut icon" href="#">
    <link rel="icon" type="image/png" href="../favicon.ico">
    <link rel="stylesheet" href="shared.css">
</head>
<style>
.main {
    width:90%;
    margin: auto;
    max-width: 600px;
}

#book-form {
    display: flex;
    flex-direction: column;
}

.form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 10px;
    float: left;
}

label {
    margin-bottom: 5px;
    font-family: sans-serif;
    font-size: 16px;
}

p {
    margin: 0;
    margin-bottom: 10px;
    font-size: 18px;
}

/* .output .input-group {
    display: flex;
    align-items: center;
  } */

button.output {
    margin-bottom: 20px;
}

 /* .output input[type="text"] {
    flex: 1;
    margin-right: 0.5rem;
  } */


.check {
    color: #039318;
    font-family: sans-serif;
    display: inline-block;
    display: none;
    margin-left: 12px;
}

.check img {
    width: 14px;
    margin-right: 3px;
}

hr {
    margin: 0px 0 12px 0;
    height: 1px;
    background: #676767;
    clear: both;
}

#links {
    float: right;
    display: none;
}

#photos img {
    display: block;
    margin: auto;
    max-width: 90%;
    margin-bottom: 15px;
}

#photos span {
    margin-bottom: 5px;
    display: block;
}

#checkbox-container {
    display: flex;
    margin-bottom: 12px;
}

.checkbox-column {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start; /* Align checkboxes to the left of the label */
  flex: 1; /* Distribute columns evenly */
  line-height: 5px;
  margin-top: 9px;
}

.checkbox-label {
  margin-left: 10px;
  display: inline-block;
  vertical-align: middle;
  position: relative;
  left: 16px;
  top: -12px;
}

#isbn-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.isbn-row {
    display: flex;
    align-items: center;
    gap: 8px;
}

#isbn-form select,
#isbn-form input[type="text"] {
    width: 250px;
    box-sizing: border-box;
}

.isbn-buttons button {
    margin-left: 8px;
}

#copyPreviousModal {
    width: 50%;
    overflow: hidden;
    border: 1px solid black;
    padding: 20px;
    position: absolute;
    background: white;
    z-index: 999;
    left: 25%;
    top: 60px;
    display: none;
}

.row {
    margin-bottom: 14px;
}

.row:last-of-type {
    margin-bottom: 0;
}

#copyPreviousModal p {
    display: inline;
}

.previousButton {
    display: inline;
    margin-right: 20px;
}

#closeButton {
    position: absolute;
    top: 0;
    right: 0;
    border: none;
    background: none;
    color: black;
    font-weight: 500;
    font-size: 20px;
}

#clearModal {
    width: 300px;
    border: 1px solid black;
    padding: 24px;
    position: absolute;
    background: white;
    z-index: 999;
    left: 50%;
    top: 140px;
    transform: translate(-50%, -50%);
    display: none;
    font-family: sans-serif;
}

#clearModal p {
    margin-bottom: 20px;
}

#clearModal .modal-buttons {
    display: flex;
    gap: 28px;
    justify-content: center;
}

.info-modal {
    width: 340px;
    border: 1px solid black;
    padding: 36px 24px 24px 24px;
    position: absolute;
    background: white;
    z-index: 999;
    left: 50%;
    top: 190px;
    transform: translate(-50%, -50%);
    display: none;
    font-family: sans-serif;
}

.info-modal p {
    margin-bottom: 20px;
}

.info-modal .modal-buttons {
    display: flex;
    justify-content: center;
}

#watchListModal h3 {
    text-align: center;
    font-size: 25px;
    margin-top: 0;
}


</style>
<body>
    <nav>
        <a href="prescreen.html">Prescreen</a>
    </nav>
    <div id="inventoryModal" class="info-modal">
        <button type="button" id="closeButton" onclick="closeInfoModal('inventoryModal')">X</button>
        <p><b>This book may already be in inventory.</b> Please let Susan know!</p>
        <p id="inventoryModalMatch"></p>
        <div class="modal-buttons">
            <button type="button" onclick="closeInfoModal('inventoryModal')">OK</button>
        </div>
    </div>
    <!-- <div id="watchListModal" class="info-modal">
        <button type="button" id="closeButton" onclick="closeInfoModal('watchListModal')">X</button>
        <h3>🌼 Title Watch 🌼</h3>
        <p>This book might be on the Title Watch list:</p>
        <p id="watchListModalMatch"></p>
        <div class="modal-buttons">
            <button type="button" onclick="closeInfoModal('watchListModal')">OK</button>
        </div>
    </div> -->
    <div id="clearModal">
        <p>Previous book has not been saved.</p>
        <div class="modal-buttons">
            <button type="button" class="outline" onclick="confirmClear()">Clear</button>
            <button type="button" onclick="closeClearModal()">Cancel</button>
        </div>
    </div>
    <div id="copyPreviousModal">
        <button type="button" id="closeButton" onClick="closeModal()">X</button>
        <div id="modalContent"></div>
    </div>
    <div class="main">
        <div class="isbn-group">
            <h2>Librarian</h2>
            <form id="isbn-form">
                <select id="format-select">
                    <option value="" disabled selected hidden>Format...</option>
                    <option>HCDJ</option>
                    <option>HC</option>
                    <option>PB</option>
                    <option>french-flap PB</option>
                    <option>MMPB</option>
                    <option>spiral-bound</option>
                </select>
                <select id="condition-select">
                    <option value="" disabled selected hidden>Condition...</option>
                    <option>in Gift-Worthy condition</option>
                    <option>in nice clean condition</option>
                    <option>with minor wear</option>
                    <option>with wear</option>
                </select>
                <div class="isbn-row">
                    <input type="text" id="isbn-input" name="isbn" placeholder="ISBN">
                    <div class="isbn-buttons">
                        <button type="submit" id="lookup-btn">Lookup</button>
                        <button type="button" class="outline" onClick="onClearClick()">Clear</button>
                    </div>
                </div>
            </form>
            <br>
            
            <div class="form-group output">
                <div class="input-group">
                    <input type="text" id="output" name="author">
                    <button id="output" class="output" onclick="generate(true)" type="submit">Generate</button>
                    <button id="previousButton" onclick="copyPrevious()" title="Copy Previous">
                        Previous
                    </button>
                    <div class="check"><img src="check.png">Copied</div>
                </div>
            </div>
            <div id="links"></div>
        </div>
        <hr>
        <form id="book-form">
            <div class="form-group">
            <label for="title-input">Title:</label>
            <input type="text" id="title-input" name="title">
            </div>
            <div class="form-group">
            <label for="author-input">Author:</label>
            <input type="text" id="author-input" name="author">
            </div>
            <div class="form-group">
            <label for="description-input">Description:</label>
            <textarea id="description-input" name="description" rows="5"></textarea>
            </div>
            <div class="form-group">
            <label for="keywords-input">Key Words:</label>
            <div id="checkbox-container"></div>
            </div>
        </form>
        <hr>
        <div id="photos"></div>
    </div>
    <script src="api.js"></script>
    <script src="librarian.js"></script>
</body>
</html>
